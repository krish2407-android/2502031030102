<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ShopEasy - Sign Up</title>
    <link rel="stylesheet" href="signup.css" />
</head>
<body>
    <header class="header">
        <div class="logo">ShopEasy</div>
        <nav class="nav">
            <a href="index.html">Home</a>
            <a href="products.html">Products</a>
            <a href="about.html">About</a>
            <a href="login.html">Login</a>
            <a href="signup.html" class="btn-primary">Sign Up</a>
        </nav>
    </header>

    <main class="auth-main">
        <section class="auth-card">
            <h1>Create Account</h1>
            <p class="subtitle">Sign up to start shopping with ShopEasy.</p>
            <form>
                <div class="field">
                    <label for="signup-name">Full Name</label>
                    <input
                        type="text"
                        id="signup-name"
                        name="name"
                        placeholder="Your full name"
                        required
                    />
                </div>
                <div class="field">
                    <label for="signup-email">Email</label>
                    <input
                        type="email"
                        id="signup-email"
                        name="email"
                        placeholder="you@example.com"
                        required
                    />
                </div>
                <div class="field">
                    <label for="signup-phone">Phone Number</label>
                    <input
                        type="tel"
                        id="signup-phone"
                        name="phone"
                        placeholder="98765 43210"
                        pattern="[0-9]{10}"
                        required
                    />
                    <small class="helper">Enter 10 digit mobile number.</small>
                </div>
                <div class="field">
                    <label for="signup-password">Password</label>
                    <input
                        type="password"
                        id="signup-password"
                        name="password"
                        placeholder="Minimum 6 characters"
                        minlength="6"
                        required
                    />
                </div>
                <div class="field">
                    <label for="signup-confirm">Confirm Password</label>
                    <input
                        type="password"
                        id="signup-confirm"
                        name="confirm_password"
                        placeholder="Re-enter password"
                        minlength="6"
                        required
                    />
                </div>
                <div class="field-inline">
                    <label>
                        <input type="checkbox" name="terms" required />
                        I agree to the terms & conditions
                    </label>
                </div>
                <button type="submit" class="btn-primary btn-full">Create Account</button>
            </form>
            <p class="switch-text">
                Already have an account?
                <a href="login.html">Login</a>
            </p>
        </section>

        <section class="auth-aside">
            <img src="img/signup.jpg" alt="Signup illustration" />
        </section>
    </main>

    <footer class="footer">
        <p>&copy; 2026 ShopEasy. All rights reserved.</p>
    </footer>
</body>
</html>
