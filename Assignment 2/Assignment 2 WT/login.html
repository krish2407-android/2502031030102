<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ShopEasy - Login</title>
    <link rel="stylesheet" href="login.css" />
</head>
<body>
    <header class="header">
        <div class="logo">ShopEasy</div>
        <nav class="nav">
            <a href="index.html">Home</a>
            <a href="products.html">Products</a>
            <a href="about.html">About</a>
            <a href="login.html" class="active">Login</a>
            <a href="signup.html" class="btn-primary">Sign Up</a>
        </nav>
    </header>

    <main class="auth-main">
        <section class="auth-card">
            <h1>Login</h1>
            <p class="subtitle">Welcome back! Please login to continue.</p>
            <form>
                <div class="field">
                    <label for="login-email">Email</label>
                    <input
                        type="email"
                        id="login-email"
                        name="email"
                        placeholder="you@example.com"
                        required
                    />
                </div>
                <div class="field">
                    <label for="login-password">Password</label>
                    <input
                        type="password"
                        id="login-password"
                        name="password"
                        placeholder="Enter your password"
                        minlength="6"
                        required
                    />
                </div>
                <div class="field-inline">
                    <label>
                        <input type="checkbox" name="remember" />
                        Remember me
                    </label>
                    <a href="#" class="link-small">Forgot password?</a>
                </div>
                <button type="submit" class="btn-primary btn-full">Login</button>
            </form>
            <p class="switch-text">
                New here?
                <a href="signup.html">Create an account</a>
            </p>
        </section>

        <section class="auth-aside">
            <img src="img/login.jpg" alt="Online shopping illustration" />
        </section>
    </main>

    <footer class="footer">
        <p>&copy; 2026 ShopEasy. All rights reserved.</p>
    </footer>
</body>
</html>
